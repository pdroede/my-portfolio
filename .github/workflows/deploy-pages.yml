# Build and deploy static site to GitHub Pages (Settings → Pages → GitHub Actions).
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      # Vite must see VITE_BASE_PATH so /assets/*.js load under /<repo>/ (not site root).
      - name: Build
        run: |
          REPO="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [ "$REPO" = "${OWNER}.github.io" ]; then
            export VITE_BASE_PATH="/"
          else
            export VITE_BASE_PATH="/$REPO/"
          fi
          echo "VITE_BASE_PATH=$VITE_BASE_PATH"
          npm run build

      # SPA: GitHub Pages serves this when a route has no matching file (e.g. /trabalhos/foo).
      - run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
